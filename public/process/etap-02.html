<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etap 02 — kosztorys</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0D0B09;
    --bg-alt: #141210;
    --paper: #1A1714;
    --ink: #E2D9CE;
    --muted: #9A8E7E;
    --dim: #5E564A;
    --accent: #C4A97D;
    --accent-bg: rgba(196,169,125,.1);
    --val: #C4A97D;
    --total: #C4A97D;
    --total-bg: rgba(196,169,125,.1);
    --grid: #2A2622;
    --line: #2A2622;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
  }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-weight: 300;
    display: flex; flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* Tabs bar — top */
  .tabs {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    padding: 10px 8px; border: none; background: transparent;
    cursor: pointer; font: 500 9px/1 'Plus Jakarta Sans', system-ui, sans-serif;
    color: var(--muted); letter-spacing: .05em; text-transform: uppercase;
    transition: all .15s; text-align: center;
  }
  .tab.active { background: var(--accent); color: var(--bg); }
  .tab:hover:not(.active) { background: var(--bg-alt); color: var(--ink); }

  /* Document frame — fills remaining space */
  .frame {
    flex: 1;
    background: var(--paper);
    padding: 12px;
    overflow: hidden;
    display: flex; flex-direction: column;
  }

  .doc-header {
    border-bottom: 1px solid var(--accent);
    padding-bottom: 8px;
    margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: flex-start;
    flex-shrink: 0;
  }
  .doc-header h1 {
    font-family: 'Newsreader', Georgia, serif;
    font-size: 12px; color: var(--ink); font-weight: 700;
    letter-spacing: -.2px;
  }
  .doc-header .company {
    font-size: 7px; color: var(--muted); margin-top: 2px; line-height: 1.4;
  }
  .doc-header .meta {
    font-size: 7px; color: var(--muted); text-align: right; line-height: 1.5;
    flex-shrink: 0;
  }
  .doc-header .meta strong { color: var(--ink); }

  .offer-title {
    font-size: 8px; color: var(--ink); margin-bottom: 6px;
    font-style: italic; padding: 4px 8px;
    background: var(--bg-alt); border-left: 2px solid var(--accent);
    flex-shrink: 0;
  }

  .table-wrap {
    flex: 1; overflow: hidden;
    display: flex; flex-direction: column;
    font-size: 7.5px; line-height: 1.4;
  }

  /* === PODSUMOWANIE === */
  .sum-colhead {
    display: grid;
    grid-template-columns: 24px 1fr 64px;
    gap: 4px;
    background: var(--accent-bg);
    color: var(--accent); font-weight: 600;
    padding: 4px 6px;
    font-size: 7px;
    letter-spacing: .03em;
    flex-shrink: 0;
  }
  .sum-row {
    display: grid;
    grid-template-columns: 24px 1fr 64px;
    gap: 4px;
    padding: 4px 6px;
    border-bottom: 1px solid var(--grid);
    color: var(--ink);
    opacity: 0;
    animation: fadeRow .25s ease-out forwards;
  }
  .sum-row:nth-child(even) { background: rgba(255,255,255,.02); }
  .sum-row .id { color: var(--dim); font-weight: 600; font-variant-numeric: tabular-nums; font-family: ui-monospace, monospace; }
  .sum-row .val { text-align: right; font-weight: 700; color: var(--val); font-variant-numeric: tabular-nums; font-family: ui-monospace, monospace; }
  .sum-row .val.zero { color: var(--dim); font-weight: 500; }

  /* === SZCZEGÓŁOWY === */
  .det-colhead {
    display: grid;
    grid-template-columns: 1fr 50px 36px;
    gap: 4px;
    background: var(--accent-bg);
    color: var(--accent); font-weight: 600;
    padding: 4px 6px;
    font-size: 7px;
    letter-spacing: .03em;
    flex-shrink: 0;
  }
  .det-colhead .num { text-align: right; }
  .det-colhead .unit { text-align: center; }
  .det-row {
    display: grid;
    grid-template-columns: 1fr 50px 36px;
    gap: 4px;
    padding: 3px 6px;
    border-bottom: 1px solid var(--grid);
    color: var(--ink);
    opacity: 0;
    animation: fadeRow .2s ease-out forwards;
    font-size: 7px;
  }
  .det-row:nth-child(even) { background: rgba(255,255,255,.02); }
  .det-row .desc { line-height: 1.3; }
  .det-row .num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; color: var(--val); font-family: ui-monospace, monospace; }
  .det-row .unit { text-align: center; color: var(--muted); font-weight: 600; }
  .det-row.section {
    background: var(--accent-bg);
    color: var(--accent);
    font-weight: 600;
    border-left: 2px solid var(--accent);
    margin-top: 2px;
    padding: 4px 6px 4px 8px;
    font-size: 7.5px;
    letter-spacing: .3px;
  }
  .det-row.section > *:not(.desc) { display: none; }
  .det-row.section .desc { grid-column: 1 / -1; }

  .rows-area {
    flex: 1; overflow-y: auto; margin-top: 2px;
    scrollbar-width: thin; scrollbar-color: var(--dim) transparent;
  }
  .rows-area::-webkit-scrollbar { width: 3px; }
  .rows-area::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  /* === TOTAL === */
  .total {
    margin-top: 8px;
    padding-top: 8px;
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1.5px solid var(--ink);
    flex-shrink: 0;
  }
  .total .label {
    font-size: 8px; color: var(--ink); font-weight: 600;
    letter-spacing: .3px;
  }
  .total .amount {
    font-family: ui-monospace, monospace;
    font-size: 14px; font-weight: 800;
    color: var(--total);
    background: var(--total-bg);
    padding: 4px 10px;
    border: 1px solid var(--total);
    font-variant-numeric: tabular-nums;
    opacity: 0;
    transition: opacity .4s;
  }
  .total .amount.visible { opacity: 1; }

  @keyframes fadeRow {
    from { opacity: 0; transform: translateY(-3px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" data-view="summary">PODSUMOWANIE</button>
  <button class="tab" data-view="detailed">ZAKRES PRAC</button>
</div>

<div class="frame">
  <div class="doc-header">
    <div>
      <h1>KOSZTORYS <span id="docType">— PODSUMOWANIE</span></h1>

    </div>
    <div class="meta">
      <strong>DATA:</strong> 2026-05-18<br>

  <div class="offer-title">
    Oferta na przebudowę lokalu biurowego

  <div class="table-wrap" id="table"></div>

  <div class="total">
    <span class="label">WARTOŚĆ NETTO</span>
    <span class="amount" id="amount">0,00 zł</span>
  </div>
</div>

const detailed = [

  ['SANITARNE', 'section'],

  ['HVAC', 'section'],

  ['DOKUMENTACJA POWYKONAWCZA', 'section'],
  ['Dokumentacja architektura (kierownik robót)', '1', 'kpl.'],
  ['Dokumentacja elektryka (kierownik robót)', '1', 'kpl.'],
  ['Dokumentacja sanitarna (kierownik robót)', '1', 'kpl.'],

  ['Pomiar parametrów instalacji elektrycznej', '46', 'pkt.'],
  ['Pomiar okablowania strukturalnego FLUKE', '68', 'pkt.'],
];

const TOTAL = 544498.67;
const fmtPLN = new Intl.NumberFormat('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtVal = (n) => fmtPLN.format(n);

let currentView = 'summary';
let timeouts = [];

function clearTimeouts() {
  timeouts.forEach(t => clearTimeout(t));
  timeouts = [];
}

function render(view) {
  clearTimeouts();
  currentView = view;
  document.getElementById('docType').textContent = view === 'summary' ? '— PODSUMOWANIE' : '— ZAKRES PRAC';
  const amountEl = document.getElementById('amount');
  const totalEl = document.querySelector('.total');
  amountEl.classList.remove('visible');
  amountEl.textContent = '0,00 zł';

  totalEl.style.display = view === 'detailed' ? 'none' : 'flex';

  const tableEl = document.getElementById('table');
  tableEl.innerHTML = '';

  if (view === 'summary') {
    const head = document.createElement('div');
    head.className = 'sum-colhead';
    head.innerHTML = '<span>Lp.</span><span>Dział</span><span style="text-align:right">Wartość</span>';
    tableEl.appendChild(head);

    const area = document.createElement('div');
    area.className = 'rows-area';
    tableEl.appendChild(area);

    summary.forEach((item, idx) => {
      const t = setTimeout(() => {
        const row = document.createElement('div');
        row.className = 'sum-row';
        const isZero = item[2] === 0;
        row.innerHTML = `
          <span class="id">${item[0]}</span>
          <span>${item[1]}</span>
          <span class="val ${isZero ? 'zero' : ''}">${isZero ? '—' : fmtVal(item[2])}</span>
        `;
        area.appendChild(row);
      }, idx * 200);
      timeouts.push(t);
    });

    const totalDelay = summary.length * 200 + 300;
    timeouts.push(setTimeout(() => animateTotal(amountEl), totalDelay));

  } else {
    const head = document.createElement('div');
    head.className = 'det-colhead';
    head.innerHTML = '<span>Opis pozycji</span><span class="num">Ilość</span><span class="unit">j.m.</span>';
    tableEl.appendChild(head);

    const area = document.createElement('div');
    area.className = 'rows-area';
    tableEl.appendChild(area);

    detailed.forEach((item, idx) => {
      const t = setTimeout(() => {
        const row = document.createElement('div');
        const isSec = item[1] === 'section';
        row.className = 'det-row' + (isSec ? ' section' : '');
        if (isSec) {
          row.innerHTML = `<span class="desc">▸ ${item[0]}</span>`;
        } else {
          row.innerHTML = `
            <span class="desc">${item[0]}</span>
            <span class="num">${item[1]}</span>
            <span class="unit">${item[2]}</span>
          `;
        }
        area.appendChild(row);
        area.scrollTop = area.scrollHeight;
      }, idx * 90);
      timeouts.push(t);
    });
  }
}

function animateTotal(el) {
  el.classList.add('visible');
  const duration = 1400;
  const start = performance.now();
  function tick(now) {
    const p = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = fmtVal(TOTAL * eased) + ' zł';
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.view);
  });
});

render('summary');
</script>
</body>
</html>
