<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Etap 02 — kosztorys</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0D0B09;
    --bg-alt: #141210;
    --paper: #1A1714;
    --ink: #E2D9CE;
    --muted: #9A8E7E;
    --dim: #5E564A;
    --accent: #C4A97D;
    --accent-bg: rgba(196,169,125,.1);
    --heading: #E2D9CE;
    --val: #C4A97D;
    --total: #C4A97D;
    --total-bg: rgba(196,169,125,.1);
    --grid: #2A2622;
    --line: #2A2622;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100vh; background: var(--bg); }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-weight: 300;
    padding: 24px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    -webkit-font-smoothing: antialiased;
  }

  .tabs {
    display: flex; gap: 4px;
    background: var(--bg-alt); border: 1px solid var(--line); padding: 4px;
  }
  .tab {
    padding: 8px 18px; border: none; background: transparent;
    cursor: pointer; font: 500 12px/1 'Plus Jakarta Sans', system-ui, sans-serif;
    color: var(--muted); letter-spacing: .03em;
    transition: all .15s;
  }
  .tab.active { background: var(--accent); color: var(--bg); }
  .tab:hover:not(.active) { background: var(--bg); color: var(--ink); }

  .controls {
    display: flex; gap: 8px; align-items: center;
  }
  .btn {
    padding: 6px 14px; border: 1px solid var(--line);
    background: var(--bg-alt); color: var(--muted);
    font: 500 12px/1 'Plus Jakarta Sans', system-ui, sans-serif; cursor: pointer;
    transition: all .15s; letter-spacing: .03em;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .btn.primary:hover { background: #D4BA8E; color: var(--bg); }

  .frame {
    width: min(92vw, 720px);
    aspect-ratio: 4/5;
    background: var(--paper);
    border: 1px solid var(--line);
    padding: 28px 32px;
    overflow: hidden;
    display: flex; flex-direction: column;
    position: relative;
  }

  .doc-header {
    border-bottom: 2px solid var(--accent);
    padding-bottom: 12px;
    margin-bottom: 14px;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .doc-header h1 {
    font-family: 'Newsreader', Georgia, serif;
    font-size: 18px; color: var(--ink); font-weight: 700;
    letter-spacing: -.3px;
  }
  .doc-header .company {
    font-size: 10px; color: var(--muted); margin-top: 3px; line-height: 1.5;
  }
  .doc-header .meta {
    font-size: 9.5px; color: var(--muted); text-align: right; line-height: 1.6;
  }
  .doc-header .meta strong { color: var(--ink); }

  .offer-title {
    font-size: 11px; color: var(--ink); margin-bottom: 12px;
    font-style: italic; padding: 6px 10px;
    background: var(--bg-alt); border-left: 3px solid var(--accent);
  }

  .table-wrap {
    flex: 1; overflow: hidden;
    display: flex; flex-direction: column;
    font-size: 9.5px; line-height: 1.45;
  }

  /* === PODSUMOWANIE === */
  .sum-colhead {
    display: grid;
    grid-template-columns: 36px 1fr 100px;
    gap: 10px;
    background: rgba(196,169,125,.08);
    color: var(--accent); font-weight: 600;
    padding: 7px 10px;
    font-size: 9.5px;
    letter-spacing: .03em;
  }
  .sum-row {
    display: grid;
    grid-template-columns: 36px 1fr 100px;
    gap: 10px;
    padding: 6px 10px;
    border-bottom: 1px solid var(--grid);
    color: var(--ink);
    opacity: 0;
    animation: fadeRow .25s ease-out forwards;
  }
  .sum-row:nth-child(even) { background: rgba(255,255,255,.02); }
  .sum-row .id { color: var(--dim); font-weight: 600; font-variant-numeric: tabular-nums; font-family: 'SF Mono', 'Cascadia Code', ui-monospace, monospace; }
  .sum-row .val { text-align: right; font-weight: 700; color: var(--val); font-variant-numeric: tabular-nums; font-family: 'SF Mono', 'Cascadia Code', ui-monospace, monospace; }
  .sum-row .val.zero { color: var(--dim); font-weight: 500; }

  /* === SZCZEGÓŁOWY (tylko ilość + j.m.) === */
  .det-colhead {
    display: grid;
    grid-template-columns: 1fr 80px 60px;
    gap: 10px;
    background: rgba(196,169,125,.08);
    color: var(--accent); font-weight: 600;
    padding: 7px 10px;
    font-size: 9.5px;
    letter-spacing: .03em;
  }
  .det-colhead .num { text-align: right; }
  .det-colhead .unit { text-align: center; }
  .det-row {
    display: grid;
    grid-template-columns: 1fr 80px 60px;
    gap: 10px;
    padding: 5px 10px;
    border-bottom: 1px solid var(--grid);
    color: var(--ink);
    opacity: 0;
    animation: fadeRow .2s ease-out forwards;
    font-size: 9.5px;
  }
  .det-row:nth-child(even) { background: rgba(255,255,255,.02); }
  .det-row .desc { line-height: 1.35; }
  .det-row .num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; color: var(--val); font-family: 'SF Mono', 'Cascadia Code', ui-monospace, monospace; }
  .det-row .unit { text-align: center; color: var(--muted); font-weight: 600; }
  .det-row.section {
    background: var(--accent-bg);
    color: var(--accent);
    font-weight: 600;
    border-left: 3px solid var(--accent);
    margin-top: 4px;
    padding: 6px 10px 6px 12px;
    font-size: 10px;
    letter-spacing: .4px;
  }
  .det-row.section > *:not(.desc) { display: none; }
  .det-row.section .desc { grid-column: 1 / -1; }

  .rows-area {
    flex: 1; overflow-y: auto; margin-top: 4px;
    scrollbar-width: thin; scrollbar-color: var(--dim) transparent;
  }
  .rows-area::-webkit-scrollbar { width: 4px; }
  .rows-area::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  /* === TOTAL === */
  .total {
    margin-top: 12px;
    padding-top: 12px;
    display: flex; justify-content: space-between; align-items: center;
    border-top: 2px solid var(--ink);
  }
  .total .label {
    font-size: 13px; color: var(--ink); font-weight: 600;
    letter-spacing: .5px;
  }
  .total .amount {
    font-family: 'SF Mono', 'Cascadia Code', ui-monospace, monospace;
    font-size: 22px; font-weight: 800;
    color: var(--total);
    background: var(--total-bg);
    padding: 6px 14px;
    border: 1.5px solid var(--total);
    font-variant-numeric: tabular-nums;
    opacity: 0;
    transition: opacity .4s;
  }
  .total .amount.visible { opacity: 1; }

  @keyframes fadeRow {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink {
    50% { opacity: 0; }
  }

  .hint {
    color: var(--dim); font-size: 11px;
    text-align: center;
  }
</style>
</head>

const TOTAL = 544498.67;
const fmtPLN = new Intl.NumberFormat('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtVal = (n) => fmtPLN.format(n);

let currentView = 'summary';
let timeouts = [];

function clearTimeouts() {
  timeouts.forEach(t => clearTimeout(t));
  timeouts = [];
}

function render(view) {
  clearTimeouts();
  currentView = view;
  document.getElementById('docType').textContent = view === 'summary' ? '— PODSUMOWANIE' : '— ZAKRES PRAC';
  const amountEl = document.getElementById('amount');
  const totalEl = document.querySelector('.total');
  amountEl.classList.remove('visible');
  amountEl.textContent = '0,00 zł';

  if (view === 'detailed') {
    totalEl.style.display = 'none';
  } else {
    totalEl.style.display = 'flex';
  }

  const tableEl = document.getElementById('table');
  tableEl.innerHTML = '';

  if (view === 'summary') {
    const head = document.createElement('div');
    head.className = 'sum-colhead';
    head.innerHTML = '<span>Lp.</span><span>Dział</span><span style="text-align:right">Wartość [zł]</span>';
    tableEl.appendChild(head);

    const area = document.createElement('div');
    area.className = 'rows-area';
    tableEl.appendChild(area);

    summary.forEach((item, idx) => {
      const t = setTimeout(() => {
        const row = document.createElement('div');
        row.className = 'sum-row';
        const isZero = item[2] === 0;
        row.innerHTML = `
          <span class="id">${item[0]}</span>
          <span>${item[1]}</span>
          <span class="val ${isZero ? 'zero' : ''}">${isZero ? '—' : fmtVal(item[2])}</span>
        `;
        area.appendChild(row);
      }, idx * 200);
      timeouts.push(t);
    });

    const totalDelay = summary.length * 200 + 300;
    timeouts.push(setTimeout(() => animateTotal(amountEl), totalDelay));

  } else {
    const head = document.createElement('div');
    head.className = 'det-colhead';
    head.innerHTML = `
      <span>Opis pozycji</span>
      <span class="num">Ilość</span>
      <span class="unit">j.m.</span>
    `;
    tableEl.appendChild(head);

    const area = document.createElement('div');
    area.className = 'rows-area';
    tableEl.appendChild(area);

    detailed.forEach((item, idx) => {
      const t = setTimeout(() => {
        const row = document.createElement('div');
        const isSec = item[1] === 'section';
        row.className = 'det-row' + (isSec ? ' section' : '');
        if (isSec) {
          row.innerHTML = `<span class="desc">▸ ${item[0]}</span>`;
        } else {
          row.innerHTML = `
            <span class="desc">${item[0]}</span>
            <span class="num">${item[1]}</span>
            <span class="unit">${item[2]}</span>
          `;
        }
        area.appendChild(row);
        area.scrollTop = area.scrollHeight;
      }, idx * 90);
      timeouts.push(t);
    });
  }
}

function animateTotal(el) {
  el.classList.add('visible');
  const duration = 1400;
  const start = performance.now();
  function tick(now) {
    const p = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = fmtVal(TOTAL * eased) + ' zł';
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.view);
  });
});

document.getElementById('replay').addEventListener('click', () => render(currentView));

render('summary');
</script>
